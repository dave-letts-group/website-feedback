<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="not-configured" class="view" style="display:none;">
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <p class="empty-text">Configure your API URL and Site Key to get started.</p>
        <button id="open-options" class="btn btn-primary">Open Settings</button>
      </div>
    </div>

    <div id="form-view" class="view" style="display:none;">
      <div class="header">
        <div class="header-left">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/>
          </svg>
          <span class="brand-name">WebFeedback</span>
        </div>
        <button id="settings-btn" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>
      </div>

      <div class="page-info">
        <div class="page-title" id="page-title"></div>
        <div class="page-url" id="page-url"></div>
      </div>

      <div class="screenshot-wrap" id="screenshot-wrap">
        <div class="screenshot-loading" id="screenshot-loading">
          <div class="spinner"></div>
          <span>Capturing...</span>
        </div>
        <img id="screenshot-img" style="display:none;" alt="Screenshot"/>
      </div>

      <div class="categories">
        <button class="cat-btn active" data-cat="general">General</button>
        <button class="cat-btn" data-cat="bug">Bug</button>
        <button class="cat-btn" data-cat="feature">Feature</button>
      </div>

      <div class="stars" id="stars">
        <button class="star" data-star="1">★</button>
        <button class="star" data-star="2">★</button>
        <button class="star" data-star="3">★</button>
        <button class="star" data-star="4">★</button>
        <button class="star" data-star="5">★</button>
      </div>

      <textarea id="message" placeholder="Describe the issue, suggest a feature, or share your thoughts..."></textarea>
      <div class="error-msg" id="error-msg"></div>

      <button id="submit-btn" class="btn btn-primary btn-full">Submit Feedback</button>
    </div>

    <div id="success-view" class="view" style="display:none;">
      <div class="empty-state">
        <div class="success-check">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <p class="success-title">Thank you!</p>
        <p class="empty-text">Your feedback has been submitted.</p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
